[settings]
# Read the Node.js version from `.node-version` so it is the single source of
# truth shared with `actions/setup-node` in CI. mise installs Node from
# `.node-version`; no `[tools]` entry is needed for it.
idiomatic_version_file_enable_tools = ["node"]

[hooks]
# Enable corepack on install so the pnpm version pinned in package.json
# ("packageManager") is used instead of any globally installed pnpm.
postinstall = "corepack enable && corepack install"

[tasks.lint]
description = "Lint all packages"
run = "pnpm lint"

[tasks.test]
description = "Run all package tests"
run = "pnpm test"

[tasks.format]
description = "Format the repository"
run = "pnpm format"

[tasks."format:check"]
description = "Check formatting"
run = "pnpm format:check"

[tasks.changeset]
description = "Create a changeset"
run = "pnpm changeset"
